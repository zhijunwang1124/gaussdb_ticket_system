server:
  port: 8090

spring:
  application:
    name: gaussdb-ticket-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:8000/wangzhijun
    username: wangzhijun
    password: Gauss@123#
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

# 日志配置
logging:
  level:
    root: INFO
    com.example.gaussdb: DEBUG
    org.springframework.jdbc.core: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/gaussdb-ticket.log
    max-size: 10MB
    max-history: 30

app:
  llm:
    provider: openai
    endpoint: https://api.openai.com/v1/chat/completions
    api-key: sk-xxxx
    model: gpt-4o-mini
    concurrent-threads: 4
