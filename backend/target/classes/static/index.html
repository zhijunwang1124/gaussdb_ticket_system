<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GaussDB 工单分析系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div id="app">
  <el-container>
    <el-header class="hero-header">
      <h1 class="hero-title">GaussDB 工单问题分析系统</h1>
    </el-header>
    <el-container class="layout-body">
      <el-aside width="220px" class="layout-aside">
        <el-menu
          :default-active="activeMenu"
          class="side-menu"
          @select="onMenuSelect">
          <el-menu-item index="ticket-analysis">
            <span>工单分析</span>
          </el-menu-item>
          <el-menu-item index="data-analysis">
            <span>数据分析</span>
          </el-menu-item>
          <el-menu-item index="ticket-query">
            <span>工单查询</span>
          </el-menu-item>
        </el-menu>
      </el-aside>
      <el-main class="layout-main">
        <div v-show="activeMenu === 'ticket-analysis'" class="page-view">
          <div class="panel">
            <el-steps :active="workflowStep" finish-status="success" simple>
              <el-step title="工单导入"></el-step>
              <el-step title="分析列配置"></el-step>
              <el-step title="分析执行"></el-step>
            </el-steps>
          </div>

          <div class="panel">
            <div class="step-title">步骤1：工单导入</div>
            <el-upload :auto-upload="false" :on-change="importExcel" accept=".xlsx,.xls">
              <el-button type="primary" round>导入 Excel</el-button>
            </el-upload>
            <div style="margin-top:10px;">
              <a class="el-link el-link--primary" href="/api/sample/tickets-excel-100" download="ticket_test_100.xlsx">下载 100 条样例 Excel（列与库表一致，可另存为 D:\\ticket_test_100.xlsx）</a>
            </div>
            <el-alert v-if="importMessage" :title="importMessage" type="success" style="margin-top:12px;"></el-alert>
          </div>

          <div class="panel" v-if="step1Completed">
            <div class="step-title">步骤2：分析列配置</div>
            <el-alert v-if="configError" :title="configError" type="error" show-icon style="margin-bottom: 12px;"></el-alert>
            <div class="config-action-row">
              <el-button type="primary" @click="showAddConfigDialog = true" round>新增分析列</el-button>
              <el-button @click="resetCurrentColumns" round>恢复全部默认分析列</el-button>
            </div>
            <el-form label-position="top" style="margin-top: 12px;">
              <el-form-item label="大模型背景提示词">
                <el-input
                  v-model="backgroundPrompt"
                  type="textarea"
                  :rows="3"
                  placeholder="例如：你是资深数据库支持专家，需要优先从连接、SQL、锁、资源、复制与备份角度判断问题。">
                </el-input>
              </el-form-item>
            </el-form>
            <el-table :data="activeAnalysisColumns" style="margin-top:12px;">
              <el-table-column prop="column_key" label="列Key（入库列名）" min-width="140"></el-table-column>
              <el-table-column prop="column_name" label="分析列名（模型输出）" min-width="200"></el-table-column>
              <el-table-column prop="description" label="解读"></el-table-column>
              <el-table-column prop="allowedText" label="范围值"></el-table-column>
              <el-table-column label="顶层分类" width="100">
                <template #default="scope">
                  <el-tag :type="scope.row.is_top_level ? 'success' : 'info'" size="small">
                    {{ scope.row.is_top_level ? '是' : '否' }}
                  </el-tag>
                </template>
              </el-table-column>
              <el-table-column label="操作" width="120">
                <template #default="scope">
                  <el-button type="danger" link @click="removeCurrentColumn(scope.row.column_key)">移除</el-button>
                </template>
              </el-table-column>
            </el-table>

            <el-dialog v-model="showAddConfigDialog" title="新增分析列" width="520px">
              <el-form label-position="top">
                <el-form-item label="列Key（英文，入库物理列名）">
                  <el-input v-model="configForm.columnKey" placeholder="例如：my_category"></el-input>
                </el-form-item>
                <el-form-item label="列名（模型 JSON 使用的 key）">
                  <el-input v-model="configForm.columnName" placeholder="例如：产品分类"></el-input>
                </el-form-item>
                <el-form-item label="解读">
                  <el-input v-model="configForm.description" type="textarea" :rows="3"></el-input>
                </el-form-item>
                <el-form-item label="允许值">
                  <el-input v-model="configForm.allowedText" placeholder="值1,值2"></el-input>
                </el-form-item>
                <el-form-item label="是否顶层分类">
                  <el-switch v-model="configForm.topLevel"></el-switch>
                </el-form-item>
              </el-form>
              <template #footer>
                <el-button @click="showAddConfigDialog = false">取消</el-button>
                <el-button type="primary" @click="addConfig">确认新增</el-button>
              </template>
            </el-dialog>
          </div>

          <div class="panel" v-if="step2Completed">
            <div class="step-title">步骤3：分析执行</div>
            <el-space wrap>
              <el-button type="primary" @click="startAnalyze" round>开始分析</el-button>
              <el-button type="danger" plain @click="stopAnalyze" :disabled="!isAnalyzing" round>停止分析</el-button>
              <el-button type="warning" plain @click="saveAnalysisToDb" :disabled="!canSaveAnalysis" round>保存分析结果</el-button>
              <el-button type="success" @click="exportTickets" :disabled="resultRows.length===0" round>导出分析结果</el-button>
            </el-space>
            <el-alert v-if="saveMessage" :title="saveMessage" type="info" style="margin-top:12px;" closable @close="clearSaveMessage"></el-alert>
            <div v-if="analysisStarted">
              <el-progress :percentage="analyzePercent" style="margin-top:12px;"></el-progress>
              <el-table :data="pagedResultRows" style="margin-top:12px;">
                <el-table-column prop="yw_no" label="YW单号" min-width="150"></el-table-column>
                <el-table-column label="状态" min-width="120">
                  <template #default="scope">
                    <span v-if="scope.row.task_status === 'SUCCESS'" style="color:#18a058;">✔</span>
                    <el-tooltip v-else-if="scope.row.task_status === 'FAILED'" :content="scope.row.task_error || '分析失败'" placement="top">
                      <span style="color:#d03050;cursor:pointer;">✘</span>
                    </el-tooltip>
                    <span v-else-if="scope.row.task_status === 'RUNNING'" style="color:#2080f0;">...</span>
                    <span v-else-if="scope.row.task_status === 'STOPPED'" style="color:#f0a020;">■</span>
                    <span v-else>-</span>
                  </template>
                </el-table-column>
                <el-table-column prop="created_date" label="起始日期" min-width="160"></el-table-column>
                <el-table-column v-for="col in importedColumnsToShow" :key="'raw-' + col" :prop="'raw_' + col" :label="col" min-width="160"></el-table-column>
                <el-table-column v-for="col in activeAnalysisColumns" :key="'ana-' + col.column_name" :prop="'ana_' + col.column_name" :label="col.column_name" min-width="140"></el-table-column>
              </el-table>
              <el-pagination
                style="margin-top: 12px;"
                background
                layout="prev, pager, next, total"
                :page-size="10"
                :current-page="resultPage"
                :total="resultRows.length"
                @current-change="onResultPageChange">
              </el-pagination>
            </div>
          </div>
        </div>

        <div v-show="activeMenu === 'ticket-query'" class="page-view">
          <div class="panel">
            <div class="step-title">已入库工单（全量）</div>
            <el-input v-model="persistedYwKeyword" placeholder="YW 单号关键字" style="max-width: 320px;"></el-input>
            <el-button style="margin-left:12px;" type="primary" plain round @click="searchPersistedTickets">查询</el-button>
            <el-table :data="pagedPersistedRows" style="margin-top:12px;">
              <el-table-column prop="yw_no" label="工单号" min-width="150" fixed></el-table-column>
              <el-table-column
                v-for="tc in ticketFieldColumns"
                :key="'pt-' + tc"
                :prop="tc"
                :label="tc"
                min-width="120"
                show-overflow-tooltip>
              </el-table-column>
              <el-table-column prop="analysis_updated_at" label="分析入库时间" min-width="170"></el-table-column>
              <el-table-column
                v-for="col in analysisColumns"
                :key="'pq-' + col.column_key"
                :prop="col.column_key"
                :label="col.column_name"
                min-width="130">
              </el-table-column>
            </el-table>
            <el-pagination
              style="margin-top: 12px;"
              background
              layout="prev, pager, next, total"
              :page-size="10"
              :current-page="persistedPage"
              :total="persistedRows.length"
              @current-change="onPersistedPageChange">
            </el-pagination>
          </div>
        </div>

        <div v-show="activeMenu === 'data-analysis'" class="page-view">
          <div class="panel">
            <div class="step-title">透视分析</div>
            <el-alert v-if="pivotError" :title="pivotError" type="error" show-icon class="pivot-alert" closable @close="clearPivotError"></el-alert>
            <div class="pivot-toolbar">
              <span class="pivot-toolbar-label">日期范围</span>
              <el-date-picker
                v-model="pivotDateRange"
                type="daterange"
                size="small"
                class="pivot-date-picker"
                start-placeholder="开始"
                end-placeholder="结束"
                value-format="YYYY-MM-DD"
                format="YYYY-MM-DD">
              </el-date-picker>
              <el-select v-model="trendGranularity" size="small" style="width:120px;">
                <el-option label="按年" value="year"></el-option>
                <el-option label="按月" value="month"></el-option>
                <el-option label="按周" value="week"></el-option>
                <el-option label="按日" value="day"></el-option>
              </el-select>
              <el-select v-model="pivotTopDimension" size="small" placeholder="顶层分析列" style="width:160px;">
                <el-option
                  v-for="c in topLevelColumns"
                  :key="c.columnKey"
                  :label="c.columnName"
                  :value="c.columnKey">
                </el-option>
              </el-select>
              <el-button type="primary" size="small" plain round @click="runPivotAnalysis">分析</el-button>
            </div>

            <div v-if="showPivotResult" class="pivot-charts">
              <div class="pivot-chart-block">
                <div class="pivot-chart-caption">时间分组透视</div>
                <div id="trend-chart" class="chart-box chart-box--trend"></div>
              </div>
              <div class="pivot-chart-block">
                <div class="pivot-chart-caption">分析列分组透视</div>
                <div id="dist-chart" class="chart-box chart-box--dist"></div>
              </div>
            </div>

            <div v-if="selectedPivotValue" style="margin-top:12px;">
              <el-alert
                type="info"
                :closable="false"
                :title="'当前已选择：' + selectedPivotLabel + ' = ' + selectedPivotValue + '，可继续选择非顶层分类进行级联分析'">
              </el-alert>
              <el-space style="margin-top:10px;">
                <el-select v-model="cascadeDimension" size="small" placeholder="下一级分析列" style="width:180px;">
                  <el-option
                    v-for="c in cascadeColumns"
                    :key="c.columnKey"
                    :label="c.columnName"
                    :value="c.columnKey">
                  </el-option>
                </el-select>
                <el-button type="primary" size="small" plain round @click="runCascadeAnalysis">级联分析</el-button>
              </el-space>
            </div>
          </div>
        </div>
      </el-main>
    </el-container>
  </el-container>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
